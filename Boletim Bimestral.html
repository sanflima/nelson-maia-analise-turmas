<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boletim Bimestral — Nelson Maia</title>
  <!-- SheetJS para leitura de Excel no browser -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>
  <script src="boletim.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Inter, Arial, sans-serif;
      background: #ebebeb;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #2f5d27;
      color: #fff;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 64px;
      border-bottom: 4px solid #1d4fa3;
    }
    .header img { height: 46px; }
    .header-titles { flex: 1; }
    .header-titles h1 {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 1.15rem;
      letter-spacing: .03em;
    }
    .header-titles p { font-size: .78rem; opacity: .85; }
    .nav-links { display: flex; gap: 8px; }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      border: 2px solid rgba(255,255,255,.55);
      color: #fff;
      padding: 7px 15px;
      border-radius: 7px;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: all .18s;
      box-shadow: 0 3px 8px rgba(0,0,0,.3);
    }
    .nav-btn:hover {
      box-shadow: 0 6px 16px rgba(0,0,0,.4);
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.9);
      filter: brightness(1.13);
    }
    .nav-btn.btn-dashboard   { background: #2f5d27; }
    .nav-btn.btn-comparativo { background: #1d4fa3; }

    /* ── Import section ── */
    .import-section {
      background: #fff;
      border-bottom: 2px solid #d0d0d0;
      padding: 14px 20px;
    }
    .import-section h2 {
      font-size: .9rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 10px;
    }
    .import-cards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .import-card {
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 150px;
      background: #f8f8f8;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .import-card:hover { border-color: #1d4fa3; background: #f0f4ff; }
    .import-card.has-data { border-color: #2f5d27; background: #f0faf0; }
    .import-card input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .import-card-label {
      font-weight: 700;
      font-size: .88rem;
      color: #1a1a1a;
    }
    .import-card-sub {
      font-size: .73rem;
      color: #666;
      margin-top: 3px;
    }
    .import-card.has-data .import-card-sub { color: #2f5d27; }
    .import-card-icon {
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    .import-card.has-data .import-card-icon::after { content: ' ✓'; font-size: .9rem; color: #2f5d27; }

    /* ── Controls bar ── */
    .controls-bar {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }
    .view-toggle {
      display: flex;
      border: 2px solid #1d4fa3;
      border-radius: 7px;
      overflow: hidden;
    }
    .view-toggle button {
      border: none;
      background: #fff;
      color: #1d4fa3;
      padding: 6px 14px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .1s, color .1s;
    }
    .view-toggle button.active { background: #1d4fa3; color: #fff; }
    .view-toggle button + button { border-left: 2px solid #1d4fa3; }

    .disc-select-wrap { display: flex; align-items: center; gap: 8px; }
    .disc-select-wrap label { font-size: .83rem; font-weight: 600; color: #444; }
    #disc-select {
      border: 2px solid #1d4fa3;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: .83rem;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
      max-width: 280px;
    }

    .controls-right { margin-left: auto; display: flex; gap: 8px; }
    .btn-sm {
      border: 2px solid #ccc;
      background: #fff;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      color: #444;
      transition: border-color .15s;
    }
    .btn-sm:hover { border-color: #1a1a1a; color: #1a1a1a; }
    .btn-sm.danger { border-color: #e21f25; color: #e21f25; }
    .btn-sm.danger:hover { background: #e21f25; color: #fff; }

    /* ── Turma tabs ── */
    .turma-tabs {
      background: #f0f0f0;
      border-bottom: 2px solid #ccc;
      display: flex;
      overflow-x: auto;
      padding: 0 20px;
      gap: 4px;
      scrollbar-width: thin;
    }
    .turma-tab {
      border: none;
      background: transparent;
      padding: 10px 14px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .turma-tab:hover { color: #1d4fa3; }
    .turma-tab.active {
      color: #1d4fa3;
      border-bottom-color: #1d4fa3;
      background: #fff;
    }

    /* ── Warning box ── */
    .warning-box {
      background: #fff8e1;
      border-left: 4px solid #d96b1f;
      padding: 8px 14px;
      margin: 12px 20px 0;
      font-size: .8rem;
      color: #7a4800;
      border-radius: 0 6px 6px 0;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 14px; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .empty-state p { font-size: .88rem; }

    /* ── Table ── */
    .table-wrap {
      margin: 16px 20px;
      overflow-x: auto;
      border-radius: 10px;
      border: 3px solid #1a1a1a;
      box-shadow: 4px 4px 0 #1a1a1a;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 600px;
      background: #fff;
      font-size: .82rem;
    }
    thead th {
      background: #1d4fa3;
      color: #fff;
      padding: 9px 10px;
      text-align: center;
      font-weight: 700;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,.2);
      position: sticky;
      top: 0;
    }
    thead th.th-name { text-align: left; min-width: 180px; }
    thead th.th-group {
      background: #163a80;
      font-size: .73rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 5px 10px;
    }
    tbody tr:nth-child(even) { background: #f5f7ff; }
    tbody tr:hover { background: #eef1ff; }
    td {
      padding: 7px 10px;
      border-right: 1px solid #e0e0e0;
      border-bottom: 1px solid #e8e8e8;
      text-align: center;
      white-space: nowrap;
    }
    td.td-name {
      text-align: left;
      font-weight: 600;
      cursor: pointer;
      color: #1d4fa3;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    td.td-name:hover { color: #0d2f70; }
    td.td-num { color: #888; font-size: .75rem; }
    td.td-gender { font-size: .75rem; color: #555; }

    /* Grade cells */
    .g-green  { background: #2f5d27; color: #fff; font-weight: 700; border-radius: 4px; padding: 2px 5px; display: inline-block; min-width: 36px; }
    .g-orange { background: #d96b1f; color: #fff; font-weight: 700; border-radius: 4px; padding: 2px 5px; display: inline-block; min-width: 36px; }
    .g-yellow { background: #e9a800; color: #1a1a1a; font-weight: 700; border-radius: 4px; padding: 2px 5px; display: inline-block; min-width: 36px; }
    .g-red    { background: #e21f25; color: #fff; font-weight: 700; border-radius: 4px; padding: 2px 5px; display: inline-block; min-width: 36px; }
    .g-null   { color: #bbb; }

    /* Situação badges */
    .sit-ok     { background: #2f5d27; color: #fff; border-radius: 4px; padding: 2px 7px; font-size: .73rem; font-weight: 700; }
    .sit-rp     { background: #e21f25; color: #fff; border-radius: 4px; padding: 2px 7px; font-size: .73rem; font-weight: 700; }
    .sit-rec    { background: #e9a800; color: #1a1a1a; border-radius: 4px; padding: 2px 7px; font-size: .73rem; font-weight: 700; }
    .sit-rec-ok { background: #1d4fa3; color: #fff; border-radius: 4px; padding: 2px 7px; font-size: .73rem; font-weight: 700; }

    /* ── Resumo table ── */
    .resumo-head { background: #2f5d27 !important; }

    /* ── Stats bar (abaixo da tabela) ── */
    .stats-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0 20px 20px;
      font-size: .8rem;
    }
    .stat-pill {
      background: #fff;
      border: 2px solid #ccc;
      border-radius: 20px;
      padding: 4px 12px;
      font-weight: 600;
    }
    .stat-pill.ap  { border-color: #2f5d27; color: #2f5d27; }
    .stat-pill.rp  { border-color: #e21f25; color: #e21f25; }
    .stat-pill.avg { border-color: #1d4fa3; color: #1d4fa3; }

    /* ── Modal boletim do aluno ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border: 3px solid #1a1a1a;
      border-radius: 12px;
      box-shadow: 6px 6px 0 #1a1a1a;
      max-width: 820px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      background: #1d4fa3;
      color: #fff;
      padding: 14px 20px;
      border-radius: 9px 9px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 { font-size: 1rem; }
    .modal-header p  { font-size: .8rem; opacity: .85; margin-top: 2px; }
    .modal-close {
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: .85rem;
    }
    .modal-body {
      overflow-y: auto;
      padding: 16px 20px;
    }
    .modal-table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      border: 2px solid #1a1a1a;
    }
    .modal-table-wrap table { min-width: 500px; }
    .modal-table-wrap thead th { font-size: .78rem; padding: 7px 8px; }
    .modal-table-wrap td { padding: 6px 8px; font-size: .8rem; }
    .modal-table-wrap td.disc-name { text-align: left; font-weight: 600; min-width: 160px; }

    /* ── Legenda ── */
    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 20px 8px;
      font-size: .75rem;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .header { flex-wrap: wrap; gap: 10px; }
      .import-cards { flex-direction: column; }
      .import-card { min-width: unset; }
      .controls-bar { gap: 8px; }
    }
  </style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────── -->
<header class="header">
  <img src="assets/logo-nm.png" alt="Logo Nelson Maia" onerror="this.style.display='none'">
  <div class="header-titles">
    <h1>BOLETIM BIMESTRAL</h1>
    <p>Colégio Estadual Nelson Maia · Ponto Novo – BA · NTE-25</p>
  </div>
  <nav class="nav-links">
    <a class="nav-btn btn-dashboard" href="index.html">Dashboard</a>
    <a class="nav-btn btn-comparativo" href="Comparação entre Turmas.html">Comparativo</a>
  </nav>
</header>

<!-- ── Import ────────────────────────────────────────────── -->
<section class="import-section">
  <h2>Importar Planilha Excel por Bimestre</h2>
  <div class="import-cards" id="import-cards">
    <!-- gerado via JS -->
  </div>
</section>

<!-- ── Turma tabs ─────────────────────────────────────────── -->
<nav class="turma-tabs" id="turma-tabs">
  <!-- gerado via JS -->
</nav>

<!-- ── Controls bar ──────────────────────────────────────── -->
<div class="controls-bar" id="controls-bar">
  <div class="view-toggle">
    <button id="btn-view-disc" class="active" onclick="setView('disciplina')">Por Disciplina</button>
    <button id="btn-view-resumo" onclick="setView('resumo')">Resumo da Turma</button>
  </div>
  <div class="disc-select-wrap" id="disc-select-wrap">
    <label for="disc-select">Disciplina:</label>
    <select id="disc-select" onchange="onDiscChange()"></select>
  </div>
  <div class="controls-right">
    <button class="btn-sm danger" onclick="confirmClear()">Limpar Dados</button>
  </div>
</div>

<!-- ── Main content ───────────────────────────────────────── -->
<div id="main-content"></div>

<!-- ── Modal boletim do aluno ─────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h2 id="modal-student-name">—</h2>
        <p id="modal-student-info">—</p>
      </div>
      <button class="modal-close" onclick="closeModal()">✕ Fechar</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
/* ── Estado da UI ───────────────────────────────────────── */
let currentTurma = '';
let currentDiscIdx = 0;
let currentView = 'disciplina';

/* ── Init ───────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  loadBState();
  renderImportCards();
  renderTurmaTabs();
  renderContent();
});

/* ── Import cards ───────────────────────────────────────── */
function renderImportCards() {
  const icons = { '1':'📋', '2':'📋', '3':'📋', 'rec':'🔄', 'mf':'🏁' };
  const container = document.getElementById('import-cards');
  container.innerHTML = BIMESTRE_ORDER.map(bKey => {
    const hasData = !!bState.bimestres[bKey] && Object.keys(bState.bimestres[bKey]).length > 0;
    const bData   = bState.bimestres[bKey] || {};
    const count   = Object.keys(bData).length;
    const firstFile = count > 0 ? (Object.values(bData)[0]?.fileName || '') : '';
    const sub = hasData
      ? `${count} turma(s) · ${firstFile}`
      : 'Clique para importar';

    return `
      <label class="import-card ${hasData ? 'has-data' : ''}" title="Importar Excel para ${BIMESTRE_LABELS[bKey]}">
        <div class="import-card-icon">${icons[bKey]}</div>
        <div class="import-card-label">${BIMESTRE_LABELS[bKey]}</div>
        <div class="import-card-sub">${sub}</div>
        <input type="file" accept=".xlsx,.xls" onchange="onFileSelected('${bKey}', this)">
      </label>`;
  }).join('');
}

async function onFileSelected(bimestre, input) {
  const file = input.files[0];
  if (!file) return;

  const card = input.closest('.import-card');
  card.querySelector('.import-card-sub').textContent = 'Importando…';

  try {
    const result = await importExcel(bimestre, file);
    showToast(`✓ ${BIMESTRE_LABELS[bimestre]}: ${result.imported} turma(s) importada(s)`, 'success');
    renderImportCards();
    renderTurmaTabs();
    renderContent();
  } catch (err) {
    showToast(`✗ Erro ao importar: ${err.message}`, 'error');
    renderImportCards();
  }
  input.value = '';
}

/* ── Turma tabs ─────────────────────────────────────────── */
function renderTurmaTabs() {
  const available = getAvailableTurmas();
  const container = document.getElementById('turma-tabs');

  if (!available.length) {
    container.innerHTML = '<span style="padding:12px 20px;font-size:.82rem;color:#888;">Nenhuma turma importada ainda</span>';
    return;
  }

  if (!currentTurma || !available.includes(currentTurma)) {
    currentTurma = available[0];
  }

  container.innerHTML = available.map(k => `
    <button class="turma-tab ${k === currentTurma ? 'active' : ''}"
            onclick="selectTurma('${k}')">
      ${TURMA_LABELS[k] || k}
    </button>
  `).join('');
}

function selectTurma(key) {
  currentTurma = key;
  currentDiscIdx = 0;
  renderTurmaTabs();
  renderContent();
}

/* ── View toggle ────────────────────────────────────────── */
function setView(v) {
  currentView = v;
  document.getElementById('btn-view-disc').classList.toggle('active', v === 'disciplina');
  document.getElementById('btn-view-resumo').classList.toggle('active', v === 'resumo');
  document.getElementById('disc-select-wrap').style.display = v === 'disciplina' ? 'flex' : 'none';
  renderContent();
}

function onDiscChange() {
  currentDiscIdx = parseInt(document.getElementById('disc-select').value, 10);
  renderContent();
}

/* ── Main render ────────────────────────────────────────── */
function renderContent() {
  const container = document.getElementById('main-content');
  const available  = getAvailableTurmas();

  if (!available.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <h3>Nenhum dado importado</h3>
        <p>Importe o arquivo Excel de cada bimestre usando os botões acima.</p>
      </div>`;
    return;
  }

  if (!currentTurma || !available.includes(currentTurma)) {
    currentTurma = available[0];
  }

  const disciplinas = getDisciplinas(currentTurma);
  const students    = getStudentBase(currentTurma);

  // Atualiza dropdown de disciplinas
  const sel = document.getElementById('disc-select');
  if (sel.children.length !== disciplinas.length ||
      (disciplinas[0] && sel.children[0]?.textContent !== disciplinas[0])) {
    sel.innerHTML = disciplinas.map((d, i) =>
      `<option value="${i}" ${i === currentDiscIdx ? 'selected' : ''}>${d}</option>`
    ).join('');
  }

  // Aviso da turma
  const warning = bState.bimestres['1']?.[currentTurma]?.warning ||
                  bState.bimestres['2']?.[currentTurma]?.warning ||
                  bState.bimestres['3']?.[currentTurma]?.warning || null;

  let html = '';
  if (warning) {
    html += `<div class="warning-box">⚠ ${escHtml(warning)}</div>`;
  }

  if (currentView === 'disciplina') {
    html += renderDiscTable(students, disciplinas, currentDiscIdx);
  } else {
    html += renderResumoTable(students, disciplinas);
  }

  container.innerHTML = html;
}

/* ── Tabela por disciplina ──────────────────────────────── */
function renderDiscTable(students, disciplinas, discIdx) {
  const disc = disciplinas[discIdx] || '—';

  // Quais bimestres têm dados para esta turma?
  const hasBim = BIMESTRE_ORDER.filter(b =>
    bState.bimestres[b]?.[currentTurma]
  );

  const hasMFImport = !!bState.bimestres['mf']?.[currentTurma];

  // Contadores
  let cntAp = 0, cntRp = 0, cntRec = 0, sumMF = 0, cntMF = 0;

  // Montar linhas
  const rows = students.map(s => {
    const grades = {};
    for (const bKey of hasBim) {
      grades[bKey] = getGrade(bKey, currentTurma, s.num, discIdx);
    }

    const mf  = computeMF(currentTurma, s.num, discIdx);
    const rec = grades['rec'] ?? null;
    const sit = situacao(mf, rec);

    if (mf != null) { sumMF += mf; cntMF++; }
    if (sit.cls === 'sit-ok' || sit.cls === 'sit-rec-ok') cntAp++;
    else if (sit.cls === 'sit-rp') cntRp++;
    else if (sit.cls === 'sit-rec') cntRec++;

    const bimCols = ['1','2','3'].map(b => {
      const v = grades[b] ?? null;
      return `<td><span class="${gradeClass(v)}">${fmtGrade(v)}</span></td>`;
    }).join('');

    const recCol = hasBim.includes('rec')
      ? `<td><span class="${gradeClass(rec)}">${fmtGrade(rec)}</span></td>`
      : '';

    const mfVal = hasMFImport ? (grades['mf'] ?? null) : mf;
    const mfCol = `<td><span class="${gradeClass(mfVal)}">${fmtGrade(mfVal)}</span></td>`;

    const sitCol = `<td><span class="${sit.cls}">${sit.label}</span></td>`;

    return `
      <tr>
        <td class="td-num">${s.num}</td>
        <td class="td-name" onclick="openStudentModal(${s.num})">${escHtml(s.name)}</td>
        <td class="td-gender">${s.gender}</td>
        ${bimCols}
        ${recCol}
        ${mfCol}
        ${sitCol}
      </tr>`;
  }).join('');

  const recHeader = hasBim.includes('rec') ? '<th>REC</th>' : '';
  const mfLabel = hasMFImport ? 'MF' : 'MF*';

  const avg = cntMF > 0 ? (sumMF / cntMF).toFixed(1) : '—';

  return `
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#2f5d27"></span> ≥ 7,0 Ótimo</span>
      <span class="legend-item"><span class="legend-dot" style="background:#d96b1f"></span> 5,0 – 6,9 Aprovado</span>
      <span class="legend-item"><span class="legend-dot" style="background:#e9a800"></span> 3,0 – 4,9 Recuperação</span>
      <span class="legend-item"><span class="legend-dot" style="background:#e21f25"></span> &lt; 3,0 Crítico</span>
      ${!hasMFImport ? '<span style="color:#888;font-size:.72rem">* MF calculada (B1+B2+B3)/3</span>' : ''}
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th colspan="3" class="th-group" style="text-align:left">${escHtml(TURMA_LABELS[currentTurma] || currentTurma)} · ${escHtml(disc)}</th>
            <th class="th-group" colspan="3">Bimestres</th>
            ${hasBim.includes('rec') ? '<th class="th-group">Rec.</th>' : ''}
            <th class="th-group">${mfLabel}</th>
            <th class="th-group">Situação</th>
          </tr>
          <tr>
            <th style="width:36px">#</th>
            <th class="th-name">Nome</th>
            <th>G</th>
            <th>B1</th><th>B2</th><th>B3</th>
            ${recHeader}
            <th>${mfLabel}</th>
            <th>Situação</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="stats-bar">
      <span class="stat-pill ap">✓ Aprovados: ${cntAp}</span>
      <span class="stat-pill rp">✗ Reprovados: ${cntRp}</span>
      ${cntRec > 0 ? `<span class="stat-pill" style="border-color:#e9a800;color:#7a5500">~ Em Rec.: ${cntRec}</span>` : ''}
      <span class="stat-pill avg">Média da turma: ${avg}</span>
      <span class="stat-pill" style="color:#555">Total: ${students.length} alunos</span>
    </div>`;
}

/* ── Tabela resumo da turma ─────────────────────────────── */
function renderResumoTable(students, disciplinas) {
  if (!disciplinas.length) return '<div class="empty-state"><p>Sem dados para exibir.</p></div>';

  const hasBim = BIMESTRE_ORDER.filter(b => bState.bimestres[b]?.[currentTurma]);
  const hasMFImport = !!bState.bimestres['mf']?.[currentTurma];

  const rows = disciplinas.map((disc, dIdx) => {
    // Calcula médias e contagens por bimestre para esta disciplina
    const bimCols = ['1','2','3'].map(bKey => {
      const grades = students
        .map(s => getGrade(bKey, currentTurma, s.num, dIdx))
        .filter(v => v != null);
      if (!grades.length) return '<td class="g-null">—</td>';
      const avg = grades.reduce((a, b) => a + b, 0) / grades.length;
      return `<td><span class="${gradeClass(avg)}">${avg.toFixed(1)}</span></td>`;
    }).join('');

    const recCol = hasBim.includes('rec') ? (() => {
      const grades = students
        .map(s => getGrade('rec', currentTurma, s.num, dIdx))
        .filter(v => v != null);
      if (!grades.length) return '<td class="g-null">—</td>';
      const avg = grades.reduce((a, b) => a + b, 0) / grades.length;
      return `<td><span class="${gradeClass(avg)}">${avg.toFixed(1)}</span></td>`;
    })() : '';

    // MF por disciplina: usa dados importados ou computa
    const mfGrades = students.map(s => computeMF(currentTurma, s.num, dIdx)).filter(v => v != null);
    const mfAvg = mfGrades.length
      ? mfGrades.reduce((a, b) => a + b, 0) / mfGrades.length
      : null;
    const mfCol = `<td><span class="${gradeClass(mfAvg)}">${fmtGrade(mfAvg)}</span></td>`;

    // Aprovados/reprovados
    const ap = mfGrades.filter(v => v >= 5).length;
    const rp = mfGrades.filter(v => v < 5).length;
    const apPct = mfGrades.length ? Math.round(ap / mfGrades.length * 100) : null;

    return `
      <tr>
        <td class="disc-name">${escHtml(disc)}</td>
        ${bimCols}
        ${recCol}
        ${mfCol}
        <td>${apPct != null ? `<span class="sit-ok">${ap}</span>` : '—'}</td>
        <td>${apPct != null ? `<span class="sit-rp">${rp}</span>` : '—'}</td>
        <td>${apPct != null ? `<span class="${apPct >= 80 ? 'sit-ok' : apPct >= 60 ? 'sit-rec' : 'sit-rp'}">${apPct}%</span>` : '—'}</td>
      </tr>`;
  }).join('');

  const recHeader = hasBim.includes('rec') ? '<th>REC</th>' : '';
  const mfLabel = hasMFImport ? 'MF' : 'MF*';

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th colspan="8" class="th-group resumo-head" style="text-align:left">
              Resumo · ${escHtml(TURMA_LABELS[currentTurma] || currentTurma)} · Médias por Disciplina
            </th>
          </tr>
          <tr>
            <th class="th-name">Disciplina</th>
            <th>Méd. B1</th><th>Méd. B2</th><th>Méd. B3</th>
            ${recHeader}
            <th>${mfLabel}</th>
            <th>Ap.</th>
            <th>Rep.</th>
            <th>% Ap.</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${!hasMFImport ? '<div style="margin:0 20px 20px;font-size:.75rem;color:#888">* MF calculada: média de B1+B2+B3 (quando os 3 bimestres estão importados)</div>' : ''}`;
}

/* ── Modal do aluno ─────────────────────────────────────── */
function openStudentModal(studentNum) {
  const disciplinas = getDisciplinas(currentTurma);
  const students    = getStudentBase(currentTurma);
  const student     = students.find(s => s.num === studentNum);
  if (!student) return;

  document.getElementById('modal-student-name').textContent = student.name;
  document.getElementById('modal-student-info').textContent =
    `${TURMA_LABELS[currentTurma] || currentTurma} · Gênero: ${student.gender} · Nº ${student.num}`;

  const hasBim = BIMESTRE_ORDER.filter(b => bState.bimestres[b]?.[currentTurma]);
  const hasMFImport = !!bState.bimestres['mf']?.[currentTurma];

  // Linha por disciplina
  const rows = disciplinas.map((disc, dIdx) => {
    const b1 = getGrade('1', currentTurma, studentNum, dIdx);
    const b2 = getGrade('2', currentTurma, studentNum, dIdx);
    const b3 = getGrade('3', currentTurma, studentNum, dIdx);
    const rec = hasBim.includes('rec') ? getGrade('rec', currentTurma, studentNum, dIdx) : undefined;
    const mf  = computeMF(currentTurma, studentNum, dIdx);
    const sit = situacao(mf, rec ?? null);

    const recCol = hasBim.includes('rec')
      ? `<td><span class="${gradeClass(rec ?? null)}">${fmtGrade(rec ?? null)}</span></td>`
      : '';

    const mfVal = hasMFImport
      ? (getGrade('mf', currentTurma, studentNum, dIdx) ?? null)
      : mf;

    return `
      <tr>
        <td class="disc-name">${escHtml(disc)}</td>
        <td><span class="${gradeClass(b1)}">${fmtGrade(b1)}</span></td>
        <td><span class="${gradeClass(b2)}">${fmtGrade(b2)}</span></td>
        <td><span class="${gradeClass(b3)}">${fmtGrade(b3)}</span></td>
        ${recCol}
        <td><span class="${gradeClass(mfVal)}">${fmtGrade(mfVal)}</span></td>
        <td><span class="${sit.cls}">${sit.label}</span></td>
      </tr>`;
  }).join('');

  const recHeader = hasBim.includes('rec') ? '<th>REC</th>' : '';
  const mfLabel = hasMFImport ? 'MF' : 'MF*';

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-table-wrap">
      <table>
        <thead>
          <tr>
            <th class="th-name">Disciplina</th>
            <th>B1</th><th>B2</th><th>B3</th>
            ${recHeader}
            <th>${mfLabel}</th>
            <th>Situação</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${!hasMFImport ? '<p style="margin-top:10px;font-size:.73rem;color:#888">* MF calculada: (B1+B2+B3)/3 — disponível apenas quando os 3 bimestres estão importados.</p>' : ''}`;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
});

/* ── Limpar dados ───────────────────────────────────────── */
function confirmClear() {
  if (!confirm('Apagar todos os dados importados dos bimestres?\nEsta ação não pode ser desfeita.')) return;
  clearBState();
  currentTurma = '';
  renderImportCards();
  renderTurmaTabs();
  renderContent();
  showToast('Dados apagados com sucesso.', 'info');
}

/* ── Toast ──────────────────────────────────────────────── */
function showToast(msg, type = 'info') {
  const colors = { success: '#2f5d27', error: '#e21f25', info: '#1d4fa3' };
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '24px', right: '24px', zIndex: '200',
    background: colors[type] || '#333', color: '#fff',
    padding: '12px 20px', borderRadius: '8px', maxWidth: '380px',
    fontSize: '.85rem', fontWeight: '600', boxShadow: '0 4px 14px rgba(0,0,0,.25)',
    animation: 'fadein .2s ease',
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

/* ── Utilitários ────────────────────────────────────────── */
function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

@keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
